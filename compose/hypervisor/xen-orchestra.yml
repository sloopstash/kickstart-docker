version: '3.8'
services:
  redis:
    image: sloopstash/redis:v${HYPERVISOR_XEN_ORCHESTRA_REDIS_VERSION}
    entrypoint: /usr/bin/supervisord
    command: "-c /etc/supervisord.conf"
    volumes:
      - redis-data:/opt/redis/data
      - redis-log:/opt/redis/log
      - ${HOME_DIR}/workload/supervisor/conf/server.conf:/etc/supervisord.conf
      - ${HOME_DIR}/workload/redis/${HYPERVISOR_XEN_ORCHESTRA_REDIS_VERSION}/conf/supervisor.ini:/opt/redis/system/supervisor.ini
      - ${HOME_DIR}/workload/redis/${HYPERVISOR_XEN_ORCHESTRA_REDIS_VERSION}/conf/server.conf:/opt/redis/conf/server.conf
    networks:
      - common
  xen-orchestra:
    image: sloopstash/xen-orchestra:v${HYPERVISOR_XEN_ORCHESTRA_VERSION}
    entrypoint: /usr/bin/supervisord
    command: "-c /etc/supervisord.conf"
    ports:
      - "${HYPERVISOR_XEN_ORCHESTRA_PORT}:80"
    volumes:
      - xen-orchestra-data:/opt/xen-orchestra/data
      - xen-orchestra-log:/opt/xen-orchestra/log
      - ${HOME_DIR}/workload/supervisor/conf/server.conf:/etc/supervisord.conf
      - ${HOME_DIR}/workload/xen-orchestra/${HYPERVISOR_XEN_ORCHESTRA_VERSION}/conf/supervisor.ini:/opt/xen-orchestra/system/supervisor.ini
      - ${HOME_DIR}/workload/xen-orchestra/${HYPERVISOR_XEN_ORCHESTRA_VERSION}/conf/server.toml:/opt/xen-orchestra/conf/server.toml
    depends_on:
      - redis
    networks:
      - common
volumes:
  redis-data:
    driver: local
  redis-log:
    driver: local
  xen-orchestra-data:
    driver: local
  xen-orchestra-log:
    driver: local
networks:
  common:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${HYPERVISOR_XEN_ORCHESTRA_NETWORK}
